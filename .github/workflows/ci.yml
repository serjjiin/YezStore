name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Lint, Testes, Tipos e Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instala dependências
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon-fake-key
          SUPABASE_SERVICE_ROLE_KEY: service-fake-key
        run: npm run build
